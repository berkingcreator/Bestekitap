<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beste Kitap - Yönetim Paneli | Auth Protected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        // 🛡️ Firebase Auth Modülleri
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwfEYe0JztVcatqsbI6vUmjizJBaSKpYQ",
            authDomain: "messi-2704f.firebaseapp.com",
            projectId: "messi-2704f",
            storageBucket: "messi-2704f.firebasestorage.app",
            messagingSenderId: "605613457448",
            appId: "1:605613457448:web:d8f4de486df83a1e3d751d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.db = db;
        window.auth = auth;
        window.fs = { collection, addDoc, getDocs, deleteDoc, doc };
        window.authActions = { signInWithEmailAndPassword, signOut };

        // 🛡️ Oturum Durumu Takibi
        onAuthStateChanged(auth, (user) => {
            const loginScreen = document.getElementById('loginScreen');
            const dashboard = document.getElementById('dashboard');
            
            if (user) {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                loadProducts();
            } else {
                loginScreen.style.display = 'flex';
                dashboard.style.display = 'none';
            }
        });
    </script>

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; }
        .brand-blue { color: #0066FF; }
        .bg-brand-blue { background-color: #0066FF; }
        .login-input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #e2e8f0; outline: none; transition: 0.3s; margin-bottom: 15px; }
        .login-input:focus { border-color: #0066FF; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 102, 255, 0.1); }
    </style>
</head>
<body class="text-gray-800">

    <div id="loginScreen" class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-3xl card-shadow w-full max-w-md text-center border border-blue-50">
            <div class="mb-8">
                <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-key brand-blue text-3xl"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-gray-900">Beste Kitap</h1>
                <p class="text-gray-400 text-sm font-semibold uppercase tracking-widest mt-1">Admin Panel v4.0</p>
            </div>
            
            <input type="email" id="adminEmail" placeholder="Yönetici E-Posta" class="login-input text-center font-semibold">
            <input type="password" id="adminPass" placeholder="Güvenlik Şifresi" class="login-input text-center font-bold tracking-widest">
            
            <button onclick="checkAdmin()" id="loginBtn" class="w-full bg-brand-blue text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition transform hover:-translate-y-1">
                Sistemi Başlat
            </button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="bg-brand-blue p-2 rounded-lg">
                    <i class="fas fa-book-open text-white"></i>
                </div>
                <span class="font-bold text-xl tracking-tight">Beste Kitap <span class="text-gray-400 font-normal">| Katalog</span></span>
            </div>
            <button onclick="logout()" class="text-gray-400 hover:text-red-500 font-bold transition flex items-center gap-2">
                <span>Çıkış</span>
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </nav>

        <main class="max-w-7xl mx-auto p-8 grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="bg-white rounded-3xl p-8 border border-gray-200 sticky top-24">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-plus-circle brand-blue"></i> Yeni Kitap Ekle
                    </h2>
                    <div class="space-y-4">
                        <input type="text" id="newName" placeholder="Kitap Adı" class="w-full p-4 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500 outline-none">
                        <textarea id="newDesc" placeholder="Kitap Açıklaması..." class="w-full p-4 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500 outline-none h-32"></textarea>
                        
                        <input type="file" id="fileInp" multiple class="hidden">
                        <button onclick="document.getElementById('fileInp').click()" class="w-full py-4 border-2 border-dashed border-blue-100 rounded-xl text-blue-500 font-bold text-sm hover:bg-blue-50 transition">
                            <i class="fas fa-images mr-2"></i> Kapak Fotoğrafları
                        </button>
                        <div id="previews" class="flex flex-wrap gap-2"></div>

                        <button onclick="saveProduct()" id="saveBtn" class="w-full bg-gray-900 text-white py-4 rounded-xl font-bold hover:bg-black transition mt-4">
                            Kataloğa Ekle
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="productGrid" class="grid md:grid-cols-2 gap-6">
                    </div>
            </div>
        </main>
    </div>

    <script>
        let tempImages = [];

        async function checkAdmin() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('loginBtn');

            if(!email || !pass) return alert("Bilgileri eksiksiz doldurun.");
            
            btn.innerText = "DOĞRULANIYOR...";
            btn.disabled = true;

            try {
                await window.authActions.signInWithEmailAndPassword(window.auth, email, pass);
            } catch (error) {
                alert("Erişim Engellendi! Bilgiler hatalı.");
                console.error(error);
            } finally {
                btn.innerText = "Sistemi Başlat";
                btn.disabled = false;
            }
        }

        async function logout() {
            if(confirm('Oturumu kapatmak istiyor musunuz?')) {
                await window.authActions.signOut(window.auth);
            }
        }

        async function loadProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400">Veriler getiriliyor...</div>';
            
            try {
                const snap = await window.fs.getDocs(window.fs.collection(window.db, "beste_katalog"));
                grid.innerHTML = '';
                snap.forEach(d => {
                    const p = d.data();
                    const img = p.images && p.images[0] ? p.images[0] : 'https://via.placeholder.com/150';
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-3xl p-6 border border-gray-100 flex gap-4 items-center group transition hover:border-blue-200';
                    card.innerHTML = `
                        <img src="${img}" class="w-24 h-24 object-cover rounded-2xl bg-gray-100">
                        <div class="flex-grow">
                            <h4 class="font-bold text-gray-900 line-clamp-1">${p.name}</h4>
                            <p class="text-xs text-gray-400 mt-1 line-clamp-2">${p.desc}</p>
                            <button onclick="deleteProduct('${d.id}')" class="mt-3 text-red-400 hover:text-red-600 text-[10px] font-bold uppercase tracking-widest transition">
                                <i class="fas fa-trash-alt"></i> Sil
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) { console.error(error); }
        }

        document.getElementById('fileInp').onchange = (e) => {
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader();
                r.onload = (ev) => {
                    tempImages.push(ev.target.result);
                    const i = document.createElement('img');
                    i.src = ev.target.result;
                    i.className = "w-12 h-12 object-cover rounded-lg border";
                    document.getElementById('previews').appendChild(i);
                };
                r.readAsDataURL(f);
            });
        };

        async function saveProduct() {
            const n = document.getElementById('newName').value;
            const d = document.getElementById('newDesc').value;
            const btn = document.getElementById('saveBtn');

            if(!n || tempImages.length === 0) return alert("İsim ve en az bir görsel gereklidir.");
            
            btn.innerText = "EKLENİYOR...";
            btn.disabled = true;

            try {
                await window.fs.addDoc(window.fs.collection(window.db, "beste_katalog"), {
                    name: n, desc: d, images: tempImages, timestamp: new Date().getTime()
                });
                tempImages = [];
                document.getElementById('previews').innerHTML = '';
                document.getElementById('newName').value = '';
                document.getElementById('newDesc').value = '';
                loadProducts();
                alert("Kitap kataloğa başarıyla eklendi.");
            } catch (err) { alert("Hata oluştu."); }
            finally {
                btn.innerText = "Kataloğa Ekle";
                btn.disabled = false;
            }
        }

        async function deleteProduct(id) {
            if(confirm('Kataloğdan silinecek, onaylıyor musunuz?')) {
                await window.fs.deleteDoc(window.fs.doc(window.db, "beste_katalog", id));
                loadProducts();
            }
        }

        window.checkAdmin = checkAdmin;
        window.saveProduct = saveProduct;
        window.deleteProduct = deleteProduct;
        window.logout = logout;
    </script>
</body>
</html>
